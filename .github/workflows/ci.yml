name: CI


on: 
  push:
    branches: [main,dev]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
        DATABASE_URL: postgresql://liveboard:liveboard@localhost:5432/liveboard
        REDIS_URL: redis://localhost:6379
        NEXTAUTH_URL: http://localhost:3000
        NEXTAUTH_SECRET: ci-secret-not-real

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: liveboard
          POSTGRES_PASSWORD: liveboard
          POSTGRES_DB: liveboard
        ports: 
         - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports: 
          - 6379:6379

    steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: 24
            cache: npm

        - name: Install dependencies
          run: npm ci
        
        - name: Generate Prisma client
          run: npx prisma generate

        - name: Run Migration
          run: npx prisma migrate deploy

        - name: Type check          
          run: npx tsc --noEmit

        - name: Lint
          run: npm run lint

        - name: Run Tests 
          run: npm test --if-present

        - name: Build
          run: npm run build

